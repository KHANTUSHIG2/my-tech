    <title>My Tech — Компьютерийн дэлгүүр</title>
    <!-- Google Identity Services (үнэгүй Google Sign-In popup) -->
    <!-- No SRI here: accounts.google.com/gsi/client omits Access-Control-Allow-Origin,
         so a crossorigin+integrity fetch is rejected outright (verified: net::ERR_FAILED).
         Trust boundary is CSP script-src (locked to https://accounts.google.com) instead. -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
